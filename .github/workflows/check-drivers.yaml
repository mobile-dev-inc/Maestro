name: Check Drivers Up-to-Date

on:
  pull_request:
    paths:
      - 'maestro-android/**'
      - 'maestro-ios-xctest-runner/**'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            android:
              - 'maestro-android/**'
            ios:
              - 'maestro-ios-xctest-runner/**'

  check-android-driver:
    name: Check Android Driver
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Rebuild Android drivers
        run: ./gradlew :maestro-android:copyMaestroAndroid :maestro-android:copyMaestroServer

      - name: Fail if drivers are out of date
        run: |
          git diff --exit-code \
            maestro-client/src/main/resources/maestro-app.apk \
            maestro-client/src/main/resources/maestro-server.apk || {
            echo ""
            echo "ERROR: Android drivers are out of date."
            echo "Run the following and commit the updated APKs:"
            echo "  ./gradlew :maestro-cli:installDist"
            exit 1
          }

  check-ios-driver:
    name: Check iOS Driver
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Check iOS drivers are up to date
        run: |
          CURRENT_CHECKSUM=$(find ./maestro-ios-xctest-runner -type f \
            \( -name "*.swift" -o -name "*.h" -o -name "*.m" -o -name "*.plist" -o -name "*.pbxproj" -o -name "*.xcscheme" \) \
            -not -path "*/build/*" | sort | xargs cat | shasum -a 256 | awk '{print $1}')

          STALE=false
          for CHECKSUM_FILE in \
            maestro-ios-driver/src/main/resources/driver-iPhoneSimulator/Debug-iphonesimulator/.source-checksum \
            maestro-ios-driver/src/main/resources/driver-iphoneos/Debug-iphoneos/.source-checksum; do
            if [[ ! -f "$CHECKSUM_FILE" ]]; then
              echo "Missing checksum file: $CHECKSUM_FILE"
              STALE=true
            elif [[ "$(cat "$CHECKSUM_FILE")" != "$CURRENT_CHECKSUM" ]]; then
              echo "Checksum mismatch in $CHECKSUM_FILE"
              echo "  Committed: $(cat "$CHECKSUM_FILE")"
              echo "  Current:   $CURRENT_CHECKSUM"
              STALE=true
            fi
          done

          if [[ "$STALE" == "true" ]]; then
            echo ""
            echo "ERROR: iOS drivers are out of date."
            echo "Run the following and commit the updated drivers:"
            echo "  ./gradlew :maestro-cli:installDist"
            exit 1
          fi

          echo "iOS drivers are up to date (checksum: ${CURRENT_CHECKSUM:0:12}...)"