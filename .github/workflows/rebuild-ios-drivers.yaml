name: Rebuild iOS Drivers

on:
  pull_request:

jobs:
  rebuild-ios-driver:
    name: Rebuild iOS Driver (Xcode 26.2)
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Verify Xcode version
        run: |
          xcodebuild -version
          xcode-select -p
      - name: Rebuild iOS drivers
        run: sh maestro-ios-xctest-runner/build-maestro-ios-runner-all.sh

      - name: Upload rebuilt drivers
        uses: actions/upload-artifact@v4
        with:
          name: ios-drivers-xcode-26.2
          path: |
            maestro-ios-driver/src/main/resources/driver-iPhoneSimulator/
            maestro-ios-driver/src/main/resources/driver-iphoneos/