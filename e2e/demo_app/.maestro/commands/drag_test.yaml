appId: com.example.example
tags:
  - passing
---
# Verifies the drag command reorders an item in the demo app's drag screen.
#
# Uses a SINGLE drag. Reaching the app's full target order (3, 1, 4, 5, 2) would
# take two reorders, but a second drag can't be targeted on iOS: after the first
# reorder Flutter collapses the moved items' accessibility node to the screen
# origin ([0,0]), so element lookups resolve to the top-left corner instead of
# the item. Tracked in https://github.com/mobile-dev-inc/maestro/issues/2984
- launchApp:
    clearState: true

# Navigate to the Drag Test screen
- tapOn: "Drag Test"

# Verify we're on the drag screen
- assertVisible:
    text: "Reorder items to.*"

# Initial order: 1, 2, 3, 4, 5
# Drag Item 3 above Item 1 -> 3, 1, 2, 4, 5
- drag:
    from:
      text: ".*Item 3.*"
    to:
      text: ".*Item 1.*"
    duration: 3000

# Verify the reorder took effect
- assertVisible: "Current order: 3, 1, 2, 4, 5"
