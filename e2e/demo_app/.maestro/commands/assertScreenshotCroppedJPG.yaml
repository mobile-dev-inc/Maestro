appId: com.example.example
tags:
  - passing
  - android  # iOS uses a separate flow + baseline due to DPR rounding (assertScreenshotCroppedJPG_ios.yaml)
---
- launchApp
- tapOn: "Cropped Screenshot Test"
- waitForAnimationToEnd

- assertScreenshot:
    path: ../screenshots/assertScreenshotCroppedJPG.jpg
    thresholdPercentage: 99.9
    cropOn:
      id: "testContainer"
