# Demonstrates the drag command (maestro#1203) on web. The self-contained data
# URL below renders a blue "Drag Me" box on the left and a dashed "Drop Here"
# target on the right; a pointerdown on the source followed by a pointerup over
# the target flips the heading from "Awaiting Drag" to "Drag Success":
#
#   <div id="statusText">Awaiting Drag</div>
#   <div id="source">Drag Me</div>   (spans  10%-30% x, 40%-60% y)
#   <div id="target">Drop Here</div> (spans  70%-90% x, 40%-60% y)
#
# The drag uses percentage coordinates (absolute coords are rejected by the
# drag command), landing on the centre of each box.
url: data:text/html;base64,
name: Drag and drop # https://github.com/mobile-dev-inc/maestro/issues/1203
tags:
  - passing
  - web
---
- launchApp
- assertVisible: Awaiting Drag

- drag:
    from: "20%, 50%"
    to: "80%, 50%"
    duration: 1000

- assertVisible: Drag Success
