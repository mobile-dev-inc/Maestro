appId: com.example.example
tags:
  - passing
  - android
---
# Verify launchApp { permissions: } grants MANAGE_EXTERNAL_STORAGE
- launchApp:
    clearState: true
    permissions:
      android.permission.MANAGE_EXTERNAL_STORAGE: allow
- tapOn: "All Files Access"
- assertVisible: "Allowed"

# Verify clearState revokes the permission
- clearState: com.example.example
- launchApp
- tapOn: "All Files Access"
- assertVisible: "Not allowed"

# Verify setPermissions { all: allow } grants the permission
- setPermissions:
    permissions:
      all: allow
- back
- tapOn: "All Files Access"
- assertVisible: "Allowed"

# Verify setPermissions explicit deny revokes the permission
- setPermissions:
    permissions:
      android.permission.MANAGE_EXTERNAL_STORAGE: deny
- back
- tapOn: "All Files Access"
- assertVisible: "Not allowed"
